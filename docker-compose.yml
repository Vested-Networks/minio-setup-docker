services:
  minio:
    container_name: minio
    image: minio/minio:latest
    ports:
      - "127.0.0.1:9900:9000"  # For connecting to Minio API
      - "127.0.0.1:9901:9001"  # For viewing Minio Web Console
    volumes:
      - ./.data:/data
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: changeme
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
